name: Lokalise Sync

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - "locale/en/**/*.json"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync translations with Lokalise
        run: node scripts/lokalise-sync.js sync --pr-name "${{ github.head_ref }}" --base-ref "origin/${{ github.base_ref }}"

      - name: Commit translations
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update translations from Lokalise"
          branch: ${{ github.head_ref }}
